# docker-compose.prod.yml — PRODUCTION
#
# Usage:
#   Copy .env.example → .env, fill in all values, then:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Features:
#   - No source volume mounts — images are self-contained
#   - Postgres port NOT exposed externally
#   - No hot reload
#   - restart: unless-stopped on all services

version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No ports — only reachable by other services on the internal Docker network
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No ports — internal only
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"     # Bind to localhost only — Caddy proxies externally
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Run migrations then start gunicorn.
    command: >
      sh -c "alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000 --workers 4 --timeout 60"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        API_URL: http://backend:8000
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"     # Bind to localhost only — Caddy proxies externally
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_prod:
